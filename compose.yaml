# Deploybarer Stack der JIT-Elevation-Demo (das Projekt der Studienarbeit).
# Diese Datei liegt im Repo-Wurzelverzeichnis und ist der Hauptstack.
# Start lokal:  docker compose up --build   ->  http://localhost:8090
# Anderer Port: JIT_PORT=8096 docker compose up --build
services:
  jit-demo:
    build:
      context: .
      dockerfile: Dockerfile.jitdemo
    image: jit-elevation-demo
    ports:
      - "${JIT_PORT:-8090}:8090"
    volumes:
      - jit-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  jit-data:
