# Deploybarer Stack der JIT-Elevation-Demo.
# Start lokal:  docker compose up --build   ->  http://localhost:8080
services:
  jit-demo:
    build: .
    image: jit-elevation-demo
    ports:
      - "8080:8080"
    volumes:
      - jit-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  jit-data:
