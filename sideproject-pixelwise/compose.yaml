# PixelWise – Full-Stack-Ziffernerkennung (MNIST), umgesetzt aus dem Skript
# "Full Stack Handwerk" als docker-compose-Stack.
#
# Drei Dienste:
#   db       – PostgreSQL (Persistenz der Vorhersagen)
#   backend  – FastAPI + scikit-learn (Klassifikation), Modell beim Build trainiert
#   web      – nginx serviert das Frontend und proxied /api/ zum Backend
#
# Diese Datei liegt bewusst im Repo-Wurzelverzeichnis, damit das
# Harbor-Deploy-System sie automatisch findet und ausrollt.
#
# Start:  docker compose up --build   ->  http://localhost:8090
# Der Web-Port ist fest 8090 (Upstream-Port, den der Harbor-Edge-Proxy erwartet).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pixelwise
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pixelwise}
      POSTGRES_DB: pixelwise
    volumes:
      - pixelwise-db:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./pixelwise/backend
    image: pixelwise-backend
    environment:
      DB_HOST: db
      DB_USER: pixelwise
      DB_NAME: pixelwise
      DB_PASSWORD: ${DB_PASSWORD:-pixelwise}
      SECRET_API_KEY: ${SECRET_API_KEY:-pixelwise-demo-key}
      MODEL_PATH: models/digit_classifier_v1.pkl
    depends_on: [db]
    restart: unless-stopped

  web:
    build: ./pixelwise/web
    image: pixelwise-web
    environment:
      SECRET_API_KEY: ${SECRET_API_KEY:-pixelwise-demo-key}
    ports:
      - "${WEB_PORT:-8090}:80"
    depends_on: [backend]
    restart: unless-stopped

volumes:
  pixelwise-db:
