server {
    listen 80;
    server_name _;

    # Statisches Frontend ausliefern. no-store verhindert, dass Browser oder
    # der vorgelagerte Cloudflare-Edge alte index.html/app.js/style.css cachen
    # und nach einem Deploy weiter ausliefern (Cloudflare respektiert no-store).
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # API-Aufrufe an das Backend weiterleiten. Der abschliessende Slash in
    # proxy_pass strippt das /api/-Praefix: /api/classify -> /classify.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
