# Deploybarer Stack der JIT-Elevation-Demo.
# Start lokal:  docker compose up --build   ->  http://localhost:8080
services:
  jit-demo:
    build:
      context: .
      dockerfile: Dockerfile.jitdemo
    image: jit-elevation-demo
    ports:
      - "8090:8090"
    volumes:
      - jit-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  jit-data:
